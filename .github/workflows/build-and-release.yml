name: 构建 & 发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - run: npx electron-builder --mac --arm64 --config build-config.js --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: liepin-client-mac-arm64
          path: dist/*.dmg
          if-no-files-found: error

  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - run: npx electron-builder --mac --x64 --config build-config.js --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: liepin-client-mac-x64
          path: dist/*.dmg
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - name: Build Windows
        run: npx electron-builder --win --x64 --config build-config.js --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: liepin-client-win-x64
          path: dist/*.exe
          if-no-files-found: error

  release:
    needs: [build-mac-arm64, build-mac-x64, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize files
        run: |
          mkdir -p release-assets
          for f in artifacts/liepin-client-mac-arm64/*.dmg; do
            [ -f "$f" ] && cp "$f" "release-assets/liepin-client-mac-arm64-${GITHUB_REF_NAME}.dmg"
          done
          for f in artifacts/liepin-client-mac-x64/*.dmg; do
            [ -f "$f" ] && cp "$f" "release-assets/liepin-client-mac-x64-${GITHUB_REF_NAME}.dmg"
          done
          for f in artifacts/liepin-client-win-x64/*; do
            [ -f "$f" ] && cp "$f" "release-assets/liepin-client-win-${GITHUB_REF_NAME}.exe"
          done
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          draft: false
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: 招聘工厂客户端 ${{ github.ref_name }}
          body: |
            招聘工厂客户端 v${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
