<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招聘工厂 · 搜索控制台</title>
<style>
/* ── Design System ── */
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #13131a;
  --bg-card: #1a1a26;
  --bg-input: #0f0f18;
  --bg-hover: #22223a;
  --border: #2a2a3e;
  --border-focus: #6c5ce7;
  --text-primary: #e8e8ed;
  --text-secondary: #8888a0;
  --text-tertiary: #55556a;
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.15);
  --success: #00d68f;
  --warning: #ffa940;
  --error: #ff4d4d;
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  padding: 16px 20px 12px;
  flex-shrink: 0;
}
.header-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
.logo {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--accent), #a29bfe);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: white;
  font-weight: 600;
}
.header h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}
.header .tagline {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-left: 38px;
}

/* ── Environment Status ── */
.env-bar {
  display: flex;
  gap: 6px;
  padding: 0 20px 12px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.env-dot {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 500;
}
.env-dot.ok {
  background: rgba(0, 214, 143, 0.1);
  color: var(--success);
}
.env-dot.err {
  background: rgba(255, 77, 77, 0.1);
  color: var(--error);
}
.env-dot .circle {
  width: 5px;
  height: 5px;
  border-radius: 50%;
}
.env-dot.ok .circle { background: var(--success); box-shadow: 0 0 4px rgba(0, 214, 143, 0.5); }
.env-dot.err .circle { background: var(--error); box-shadow: 0 0 4px rgba(255, 77, 77, 0.5); }

/* ── Search Card ── */
.search-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 0 16px 10px;
  padding: 16px;
  flex-shrink: 0;
}

.input-group { margin-bottom: 12px; }

.input-group label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.input-row {
  display: flex;
  gap: 8px;
}
.input-row input[type="text"] {
  flex: 1;
}
.input-row input[type="number"] {
  width: 64px;
  text-align: center;
}

input {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  transition: border var(--transition), box-shadow var(--transition);
  font-family: inherit;
}
input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
input::placeholder {
  color: var(--text-tertiary);
}

/* ── Channel Toggle ── */
.channel-group {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.channel-btn {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text-tertiary);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
}
.channel-btn:hover {
  border-color: var(--text-secondary);
  color: var(--text-secondary);
}
.channel-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}
.channel-btn .icon { font-size: 14px; }

/* ── Search Button ── */
.search-btn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent), #a29bfe);
  color: white;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
  letter-spacing: 0.3px;
}
.search-btn:hover {
  opacity: 0.92;
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
}
.search-btn:active {
  transform: translateY(0);
}
.search-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ── Progress ── */
.progress-wrap {
  height: 2px;
  background: var(--bg-input);
  border-radius: 2px;
  margin: 10px 0 0;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), #a29bfe);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ── Log Area ── */
.log-area {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 12px;
  margin: 0;
}
.log-area::-webkit-scrollbar {
  width: 4px;
}
.log-area::-webkit-scrollbar-track {
  background: transparent;
}
.log-area::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}
.log-line {
  padding: 1px 0;
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 11px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.log-line.info { color: var(--text-secondary); }
.log-line.ok { color: var(--success); }
.log-line.warn { color: var(--warning); }
.log-line.err { color: var(--error); }
.log-line.bold { color: var(--text-primary); font-weight: 500; }

/* ── Welcome / Empty State ── */
.empty-state {
  text-align: center;
  padding: 24px 0;
  color: var(--text-tertiary);
}
.empty-state .icon { font-size: 32px; margin-bottom: 8px; }
.empty-state p { font-size: 12px; line-height: 1.6; }

/* ── Animations ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.log-area .log-line:first-of-type {
  animation: fadeIn 0.3s ease;
}

/* ── Responsive ── */
@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f5f5f7;
    --bg-secondary: #ffffff;
    --bg-card: #ffffff;
    --bg-input: #f5f5f7;
    --bg-hover: #ebebf0;
    --border: #d2d2d7;
    --text-primary: #1d1d1f;
    --text-secondary: #86868b;
    --text-tertiary: #aeaeb2;
  }
}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">🔍</div>
    <h1>招聘工厂</h1>
  </div>
  <div class="tagline" id="wsStatus">猎聘候选人搜索 · 本地直连</div>
</div>

<div class="env-bar" id="envBar"></div>

<div class="search-card">
  <div class="input-group">
    <label>搜索关键词</label>
    <div class="input-row">
      <input type="text" id="keyword" placeholder="公司 + 职位，如：字节跳动 HRD" autofocus />
      <input type="number" id="maxCount" value="45" min="10" max="100" title="最多获取人数" />
    </div>
  </div>

  <div class="channel-group" id="channelGroup">
    <button class="channel-btn active" data-channel="feishu">
      <span class="icon">🌊</span> 飞书
    </button>
    <button class="channel-btn" data-channel="wecom">
      <span class="icon">💬</span> 企微
    </button>
  </div>

  <button class="search-btn" id="searchBtn" onclick="doSearch()">开始搜索</button>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<div class="log-area" id="logArea">
  <div class="empty-state" id="emptyState">
    <div class="icon">🔍</div>
    <p>输入关键词，开始搜索猎聘候选人<br>结果将自动同步到所选通道</p>
  </div>
</div>

<script>
const { electronAPI } = window;
let envChecked = false;

// ── Logging ──
function log(msg, tag = 'info') {
  const el = document.getElementById('logArea');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  el.innerHTML += `<div class="log-line ${tag}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('logArea').innerHTML = '';
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
}

// ── Environment ──
async function checkEnv() {
  try {
    const result = await electronAPI.playwrightCheck();
    const bar = document.getElementById('envBar');
    bar.innerHTML = result.checks.map(c =>
      `<span class="env-dot ${c.ok ? 'ok' : 'err'}">
        <span class="circle"></span> ${c.name}
      </span>`
    ).join('');
    return result.status === 'ready';
  } catch (e) {
    document.getElementById('envBar').innerHTML =
      `<span class="env-dot err"><span class="circle"></span> 检测失败</span>`;
    return false;
  }
}

// ── Login ──
async function checkLogin() {
  try {
    const result = await electronAPI.checkLogin();
    if (result.status === 'ok') {
      log(`✅ 登录态有效`, 'ok');
      return true;
    }
    log(`⚠️ 未检测到登录态。请在猎聘页面扫码登录。`, 'warn');
    return false;
  } catch {
    log(`⚠️ 登录态检测失败`, 'warn');
    return false;
  }
}

// ── Config ──
async function loadConfig() {
  try {
    return await electronAPI.getConfig();
  } catch { return {}; }
}

async function saveConfig(config) {
  try {
    await electronAPI.saveConfig(config);
  } catch {}
}

// ── Channel Toggle ──
document.addEventListener('DOMContentLoaded', async () => {
  const group = document.getElementById('channelGroup');
  const config = await loadConfig();

  // Set initial state from config
  if (config.channelFeishu === false) {
    group.querySelector('[data-channel="feishu"]').classList.remove('active');
  }
  if (config.channelWecom === true) {
    group.querySelector('[data-channel="wecom"]').classList.add('active');
  }

  group.addEventListener('click', async (e) => {
    const btn = e.target.closest('.channel-btn');
    if (!btn) return;
    const channel = btn.dataset.channel;

    if (channel === 'feishu') {
      btn.classList.toggle('active');
      const config = await loadConfig();
      config.channelFeishu = btn.classList.contains('active');
      await saveConfig(config);
    } else if (channel === 'wecom') {
      if (!btn.classList.contains('active')) {
        // Activate: need webhook URL
        const url = prompt('请输入企微群机器人 Webhook URL：\n（群设置 → 群机器人 → 复制 Webhook 地址）');
        if (url && url.startsWith('https://qyapi.weixin.qq.com')) {
          btn.classList.add('active');
          const config = await loadConfig();
          config.channelWecom = true;
          config.wecomWebhook = url;
          await saveConfig(config);
          log('✅ 企微通道已配置', 'ok');
        } else if (url) {
          log('❌ 无效的 Webhook URL', 'err');
        }
      } else {
        btn.classList.remove('active');
        const config = await loadConfig();
        config.channelWecom = false;
        await saveConfig(config);
      }
    }
  });

  // Environment check
  log('⏳ 环境检测中...');
  const envOk = await checkEnv();
  if (envOk) {
    envChecked = true;
    await checkLogin();
  }
});

// ── Search ──
async function doSearch() {
  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) {
    log('⚠️ 请输入搜索关键词', 'warn');
    document.getElementById('keyword').focus();
    return;
  }

  const maxCount = parseInt(document.getElementById('maxCount').value) || 45;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '搜索中...';

  clearLog();
  setProgress(10);
  log(`开始搜索: ${keyword}`, 'bold');

  try {
    const result = await electronAPI.playwrightSearch(keyword, maxCount);
    setProgress(100);

    if (result.status === 'ok') {
      log(`\n搜索完成 — 共 ${result.count} 人`, 'ok');
      if (result.csv) log(`CSV: ${result.csv}`, 'ok');
      if (result.feishu) {
        if (result.feishu.bitable > 0) log(`飞书 Bitable: ${result.feishu.bitable} 条`, 'ok');
        if (result.feishu.group) log('飞书群通知已发送', 'ok');
      }

      log('');
      for (const c of result.candidates) {
        const parts = [c.name || '?'];
        if (c.age) parts.push(c.age + '岁');
        if (c.company) parts.push(c.company);
        if (c.position) parts.push(c.position);
        log('  ' + parts.join(' · '));
      }
    } else {
      log(`\n搜索失败: ${result.message}`, 'err');
    }
  } catch (e) {
    log(`\n异常: ${e.message}`, 'err');
  }

  btn.disabled = false;
  btn.textContent = '开始搜索';
}

// ── WebSocket 状态监听 ──
electronAPI.onWsStatus((data) => {
  const el = document.getElementById('wsStatus');
  if (data.connected) {
    el.textContent = '🟢 服务已连接 · 7×24待命中';
    el.style.color = 'var(--success)';
  } else {
    el.textContent = '🔴 服务未连接（10秒后自动重连）';
    el.style.color = 'var(--warning)';
  }
});

electronAPI.onTaskReceived((data) => {
  log(`📩 收到远程任务: ${data.keyword}`, 'bold');
});

electronAPI.onTaskComplete((data) => {
  if (data.status === 'ok') {
    log(`✅ 远程搜索完成: ${data.count} 人`, 'ok');
  } else {
    log(`❌ 远程搜索失败: ${data.message}`, 'err');
  }
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement?.tagName === 'INPUT') {
    if (!document.getElementById('searchBtn').disabled) doSearch();
  }
});
</script>
</body>
</html>
