<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招聘工厂 · 搜索控制台</title>
<style>
/* ── TalentOS Design System ── */
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #0ea5e9;
  --dark: #0f172a;
  --gray: #64748b;
  --light: #f8fafc;
  --white: #ffffff;
  --border: #e2e8f0;
  --success: #059669;
  --warning: #d97706;
  --error: #dc2626;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--light);
  color: var(--dark);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
}
.header-inner { padding: 16px 20px 12px; }
.header-top { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
.header h1 { font-size: 15px; font-weight: 700; color: white; letter-spacing: -0.2px; }
.header .tagline { font-size: 11px; color: rgba(255,255,255,0.8); margin-left: 0; }

/* ── Env Bar ── */
.env-bar { display: flex; gap: 6px; padding: 8px 16px 0; flex-shrink: 0; flex-wrap: wrap; }
.env-dot { display: flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
.env-dot.ok { background: rgba(5, 150, 105, 0.1); color: var(--success); }
.env-dot.err { background: rgba(220, 38, 38, 0.1); color: var(--error); }
.env-dot .circle { width: 5px; height: 5px; border-radius: 50%; }
.env-dot.ok .circle { background: var(--success); }
.env-dot.err .circle { background: var(--error); }

/* ── Search Card ── */
.search-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 10px 16px 8px;
  padding: 14px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}
.input-group { margin-bottom: 10px; }
.input-group label { display: block; font-size: 11px; font-weight: 600; color: var(--gray); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
.input-row { display: flex; gap: 8px; }
.input-row input[type="text"] { flex: 1; }
.input-row input[type="number"] { width: 60px; text-align: center; }
input {
  background: var(--light);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  color: var(--dark);
  font-size: 13px;
  outline: none;
  transition: border var(--transition);
  font-family: inherit;
}
input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99,102,241,0.1); }

/* ── Channel Group ── */
.channel-group { display: flex; gap: 8px; margin-bottom: 10px; }
.channel-btn {
  flex: 1; display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--light); color: var(--gray); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all var(--transition); font-family: inherit;
}
.channel-btn:hover { border-color: var(--gray); color: var(--dark); }
.channel-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(99,102,241,0.06); }

/* ── Search Button ── */
.search-btn {
  width: 100%; padding: 9px; border: none; border-radius: var(--radius-sm);
  background: var(--primary); color: white; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all var(--transition); font-family: inherit;
}
.search-btn:hover { background: var(--primary-dark); }
.search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Progress ── */
.progress-wrap { height: 2px; background: var(--border); border-radius: 2px; margin: 8px 0 0; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.4s ease; }

/* ── Actions Bar ── */
.actions-bar { display: flex; gap: 8px; padding: 0 16px 6px; flex-shrink: 0; }
.actions-bar button {
  flex: 1; padding: 6px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--white); color: var(--gray); font-size: 11px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all var(--transition);
}
.actions-bar button:hover { border-color: var(--primary); color: var(--primary); }


/* ── Result Bar ── */
.result-bar {
  display: flex; gap: 8px; padding: 6px 16px 10px; flex-shrink: 0; flex-wrap: wrap;
}
.result-item {
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 4px 8px; font-size: 10px; color: var(--gray);
  box-shadow: var(--shadow); white-space: nowrap;
}
.result-item.ok { color: var(--success); border-color: var(--success); }
.result-item.err { color: var(--error); border-color: var(--error); }
.result-item.warn { color: var(--warning); border-color: var(--warning); }

/* ── Log Area ── */
.log-area {
  flex: 1; overflow-y: auto; margin: 0 16px 10px;
  background: var(--white); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 12px; box-shadow: var(--shadow);
}
.log-area::-webkit-scrollbar { width: 4px; }
.log-area::-webkit-scrollbar-track { background: transparent; }
.log-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.log-line { padding: 1px 0; font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.log-line.info { color: var(--gray); }
.log-line.ok { color: var(--success); }
.log-line.warn { color: var(--warning); }
.log-line.err { color: var(--error); }
.log-line.bold { color: var(--dark); font-weight: 500; }

.log-line.ok:before, .log-line.err:before, .log-line.warn:before, .log-line.bold:before {
  content: ''; display: inline-block; width: 5px; height: 5px; margin-right: 6px; border-radius: 50%; vertical-align: middle;
}
.log-line.ok:before { background: var(--success); }
.log-line.err:before { background: var(--error); }
.log-line.warn:before { background: var(--warning); }
.log-line.bold:before { background: var(--primary); }

.empty-state { text-align: center; padding: 20px 0; color: var(--gray); }
.empty-state .icon { font-size: 24px; margin-bottom: 6px; }
.empty-state p { font-size: 12px; line-height: 1.6; }

/* ── Settings Modal ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); z-index: 100;
}
.modal-overlay.show { display: block; }
.modal {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: var(--white); border-radius: var(--radius); width: 90%; max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden;
}
.modal-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 14px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--gray); padding: 0; line-height: 1; }
.modal-body { padding: 14px 16px; max-height: 400px; overflow-y: auto; }
.modal-body .field { margin-bottom: 12px; }
.modal-body label { display: block; font-size: 11px; font-weight: 600; color: var(--gray); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
.modal-body input[type="text"], .modal-body input[type="url"] { width: 100%; }
.modal-body .hint { font-size: 10px; color: var(--gray); margin-top: 4px; }
.modal-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.modal-footer button {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn-primary { background: var(--primary); color: white; border: none !important; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--white); color: var(--dark); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.log-area .log-line:first-of-type { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <h1>招聘工厂</h1>
    </div>
    <div class="tagline" id="wsStatus">TalentOS · AI-Powered Recruitment</div>
  </div>
</div>

<!-- Status -->
<div class="env-bar" id="envBar"></div>

<!-- Search -->
<div class="search-card">
  <div class="input-group">
    <label>搜索关键词</label>
    <div class="input-row">
      <input type="text" id="keyword" placeholder="如：字节跳动 HRD" autofocus />
      <input type="number" id="maxCount" value="45" min="10" max="100" />
    </div>
  </div>
  <div class="channel-group" id="channelGroup">
    <button class="channel-btn active" data-channel="feishu">🌊 飞书</button>
    <button class="channel-btn" data-channel="wecom">💬 企微</button>
  </div>
  <button class="search-btn" id="searchBtn" onclick="doSearch()">开始搜索</button>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<!-- Actions -->
<div class="actions-bar">
  <button onclick="showSettings()">⚙️ 设置</button>
  <button onclick="ipcRenderer.invoke('ws:reconnect')">🔄 重连</button>
  <button id="loginBtn" onclick="openBrowserLogin()">🔑 登录猎聘</button>
</div>

<!-- Log -->
<div class="log-area" id="logArea">
  <div class="empty-state" id="emptyState">
    <div class="icon">🔍</div>
    <p>输入关键词，开始搜索猎聘候选人</p>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙️ 设置</h2>
      <button class="modal-close" onclick="hideSettings()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>飞书群</label>
        <input type="text" id="settingFeishuWebhook" placeholder="飞书群机器人 Webhook URL" />
        <div class="hint">群设置 → 群机器人 → 复制 Webhook 地址</div>
      </div>
      <div class="field">
        <label>企微群</label>
        <input type="text" id="settingWecomWebhook" placeholder="企微群机器人 Webhook URL" />
        <div class="hint">群设置 → 群机器人 → 复制 Webhook 地址</div>
      </div>
      <div class="field">
        <label>钉钉群</label>
        <input type="text" id="settingDingtalkWebhook" placeholder="钉钉群机器人 Webhook URL" />
        <div class="hint">群设置 → 智能群助手 → 添加机器人 → 复制 Webhook</div>
      </div>
      <div class="field">
        <label>客户端标识</label>
        <input type="text" id="settingClientId" readonly style="background:#f0f0f0;" />
        <div class="hint">用于服务器识别这台设备</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="hideSettings()">取消</button>
      <button class="btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>

</div>

<!-- 底部搜索结果栏 -->
<div class="result-bar" id="resultBar">
  <div class="result-item" id="resultCount">—</div>
  <div class="result-item" id="resultCsv">—</div>
  <div class="result-item" id="resultFeishu">—</div>
  <div class="result-item" id="resultBitable">—</div>
</div>

<script>
// contextIsolation=false + nodeIntegration=true, 可以直接用 require
const { ipcRenderer } = require('electron');

// ── Logging ──
function log(msg, tag = 'info') {
  const el = document.getElementById('logArea');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  el.innerHTML += `<div class="log-line ${tag}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('logArea').innerHTML = '';
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
}

// ── Env Check ──
async function checkEnv() {
  try {
    const result = await ipcRenderer.invoke('playwright:check');
    document.getElementById('envBar').innerHTML = result.checks.map(c =>
      `<span class="env-dot ${c.ok ? 'ok' : 'err'}"><span class="circle"></span> ${c.name}</span>`
    ).join('');
    return result.status === 'ready';
  } catch {
    document.getElementById('envBar').innerHTML = `<span class="env-dot err"><span class="circle"></span> 检测失败</span>`;
    return false;
  }
}

// ── Config ──
async function loadConfig() {
  try { return await ipcRenderer.invoke('config:get'); } catch { return {}; }
}

async function saveConfig(config) {
  try { await ipcRenderer.invoke('config:save', config); } catch {}
}

// ── Settings Modal ──
async function showSettings() {
  const config = await loadConfig();
  document.getElementById('settingFeishuWebhook').value = config.feishuWebhook || '';
  document.getElementById('settingWecomWebhook').value = config.wecomWebhook || '';
  document.getElementById('settingDingtalkWebhook').value = config.dingtalkWebhook || '';
  document.getElementById('settingClientId').value = config.clientId || '未注册';
  document.getElementById('settingsModal').classList.add('show');
}

function hideSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}

async function saveSettings() {
  const config = await loadConfig();
  config.feishuWebhook = document.getElementById('settingFeishuWebhook').value.trim();
  config.wecomWebhook = document.getElementById('settingWecomWebhook').value.trim();
  config.dingtalkWebhook = document.getElementById('settingDingtalkWebhook').value.trim();
  await saveConfig(config);
  hideSettings();
  log('✅ 设置已保存', 'ok');
}

// ── Open Login Browser ──
async function openBrowserLogin() {
  log('🌐 打开猎聘登录页面（独立浏览器，不影响您的Chrome）...');
  try {
    await ipcRenderer.invoke('browser:open-login');
  } catch(e) {
    log('⚠️ 请手动在独立浏览器中登录猎聘', 'warn');
  }
}


async function openCandidatesFolder() {
  try {
    const { shell } = require('electron');
    const path = require('path');
    const os = require('os');
    const folder = path.join(os.homedir(), '.liepin_client', 'candidates');
    shell.openPath(folder);
  } catch(e) {
    log('❌ 无法打开文件夹: ' + e.message, 'err');
  }
}

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  const config = await loadConfig();

  // Channel state
  const group = document.getElementById('channelGroup');
  if (config.channelFeishu === false)
    group.querySelector('[data-channel="feishu"]').classList.remove('active');
  if (config.channelWecom === true)
    group.querySelector('[data-channel="wecom"]').classList.add('active');

  group.addEventListener('click', async (e) => {
    const btn = e.target.closest('.channel-btn');
    if (!btn) return;
    btn.classList.toggle('active');
    const config = await loadConfig();
    const channel = btn.dataset.channel;
    if (channel === 'feishu') config.channelFeishu = btn.classList.contains('active');
    else if (channel === 'wecom') config.channelWecom = btn.classList.contains('active');
    await saveConfig(config);
  });

  log('⏳ 环境检测中...');
  const envOk = await checkEnv();
  if (envOk) {
    const login = await ipcRenderer.invoke('liepin:check');
    if (login.status === 'ok') log('✅ 登录态有效', 'ok');
    else log('⚠️ 未检测到登录态，请点击「登录猎聘」按钮', 'warn');
  }
});

// ── Search ──
async function doSearch() {
  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) { log('⚠️ 请输入搜索关键词', 'warn'); return; }
  const maxCount = parseInt(document.getElementById('maxCount').value) || 45;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '搜索中...';
  clearLog(); setProgress(10);
  log(`开始搜索: ${keyword}`, 'bold');

  try {
    const result = await ipcRenderer.invoke('playwright:search', keyword, maxCount);
    setProgress(100);
    if (result.status === 'ok') {
      // 更新底部结果栏
      const cnt = document.getElementById('resultCount');
      const csv = document.getElementById('resultCsv');
      const feishu = document.getElementById('resultFeishu');
      const bitable = document.getElementById('resultBitable');
      if (cnt) { cnt.textContent = `👤 ${result.count} 人`; cnt.className = 'result-item ok'; }
      if (csv && result.csv) {
          csv.innerHTML = `📁 <a href="#" onclick="event.preventDefault(); require('electron').shell.openPath('${result.csv.replace(/'/g, "\\'")}')" style="color:var(--success);text-decoration:underline;">CSV 已保存</a>`;
          csv.className = 'result-item ok';
        }
      if (feishu) { feishu.textContent = result.feishu?.group ? '🌊 飞书群 ✅' : '🌊 飞书群 ❌'; feishu.className = 'result-item ' + (result.feishu?.group ? 'ok' : 'err'); }
      if (bitable) { bitable.textContent = `📊 Bitable ${result.feishu?.bitable || 0} 条`; bitable.className = 'result-item ' + (result.feishu?.bitable > 0 ? 'ok' : 'warn'); }
      
      log(`\n✅ 搜索完成 — 共 ${result.count} 人`, 'ok');
      log(``);
      for (const c of result.candidates) {
        const parts = [c.name || '?'];
        if (c.age) parts.push(c.age + '岁');
        if (c.company) parts.push(c.company);
        if (c.position) parts.push(c.position);
        log('  ' + parts.join(' · '));
      }
    } else {
      // 更新底部结果栏为失败
      ['resultCount','resultCsv','resultFeishu','resultBitable'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = '❌ 失败'; el.className = 'result-item err'; }
      });
      log(`\n❌ 搜索失败: ${result.message}`, 'err');
    }
  } catch (e) { log(`\n异常: ${e.message}`, 'err'); }

  btn.disabled = false; btn.textContent = '开始搜索';
}

// ── WebSocket Events ──
ipcRenderer.on('ws-status', (data) => {
  const el = document.getElementById('wsStatus');
  el.textContent = data.connected ? '🟢 远程服务已连接' : '🔴 远程服务未连接';
  el.style.color = data.connected ? 'rgba(255,255,255,0.8)' : 'rgba(255,200,0,0.8)';
});

ipcRenderer.on('task-received', (data) => log(`📩 收到远程任务: ${data.keyword}`, 'bold'));
ipcRenderer.on('task-complete', (data) => {
  log(data.status === 'ok' ? `✅ 远程搜索完成: ${data.count} 人` : `❌ 远程搜索失败: ${data.message}`, data.status === 'ok' ? 'ok' : 'err');
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement?.tagName === 'INPUT' && !document.getElementById('searchBtn').disabled)
    doSearch();
});

// ── Window bindings for onclick compatibility ──
// Electron contextIsolation模式下，<script>的function不会自动挂到window
// 所以需要显式绑定
window.doSearch = doSearch;
window.showSettings = showSettings;
window.hideSettings = hideSettings;
window.saveSettings = saveSettings;
window.openBrowserLogin = openBrowserLogin;
window.openCandidatesFolder = openCandidatesFolder;
window.log = log;
window.clearLog = clearLog;
window.setProgress = setProgress;

</script>
</body>
</html>
